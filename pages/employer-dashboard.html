<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard — JobForest</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layouts.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="theme-dark">

  <main class="page-container" style="padding-top: 80px;">
    <div class="container py-8">
      
      <div class="grid grid-cols-4 gap-8">
        
        <!-- Sidebar Navigation -->
        <aside class="col-span-1 reveal">
          <div class="card glass-card" id="employer-sidebar" style="padding: var(--space-4); position: sticky; top: 100px;">
            <!-- Recruiter summary header -->
            <div class="text-center pb-6 border-b border-light" id="sidebar-employer-header">
              <div class="avatar avatar-2xl mx-auto mb-3" id="sidebar-avatar">SC</div>
              <h3 style="margin:0; font-size:var(--text-md);" id="sidebar-name">Loading Recruiter...</h3>
              <span class="text-xs text-primary font-semibold mt-1" id="sidebar-company-name" style="display:inline-block;">TechNova Solutions</span>
            </div>

            <!-- Tab list links -->
            <nav class="flex flex-col gap-1 mt-6" aria-label="Employer dashboard navigation">
              <a href="#overview" class="sidebar-nav-item active" data-tab="overview" id="nav-employer-overview">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                Overview
              </a>
              <a href="#posts" class="sidebar-nav-item" data-tab="posts" id="nav-employer-posts">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Job Posts
              </a>
              <a href="#candidates" class="sidebar-nav-item" data-tab="candidates" id="nav-employer-candidates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Candidates
              </a>
              <a href="#messages" class="sidebar-nav-item" data-tab="messages" id="nav-employer-messages">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Messages
              </a>
              <a href="#company" class="sidebar-nav-item" data-tab="company" id="nav-employer-company">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a4 4 0 0 1 0 8h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
                Company Profile
              </a>
            </nav>
          </div>
        </aside>

        <!-- Main Dynamic Content Slot -->
        <section class="col-span-3 reveal" id="employer-main-content">
          <div class="btn-loader" style="margin: 50px auto;"></div>
          <!-- Injected dynamically by dashboard.js -->
        </section>

      </div>

    </div>
  </main>

  <!-- Script Modules -->
  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/matching.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Injects navbar
      Components.renderNavbar('employer-dashboard');
      App.init('employer-dashboard');

      // Populate user and company info on sidebar
      const user = JobForestData.getCurrentUser();
      if (user) {
        document.getElementById('sidebar-name').textContent = `${user.firstName} ${user.lastName}`;
        document.getElementById('sidebar-avatar').textContent = user.avatar || user.firstName[0];
        document.getElementById('sidebar-company-name').textContent = user.companyName || 'My Startup';
      }

      // Start dashboard routing
      Dashboard.init();
      Components.renderFooter('employer-dashboard');
    });
  </script>
</body>
</html>
