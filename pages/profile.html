<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder — JobForest</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layouts.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="theme-dark">

  <main class="page-container" style="padding-top: 80px;">
    <div class="container py-8">
      
      <div class="dashboard-header reveal">
        <h2>Interactive Resume Builder</h2>
        <p class="text-secondary">Assemble your profile elements. Changes are synced instantly with our AI search indexes.</p>
      </div>

      <div class="grid grid-cols-3 gap-8">
        
        <!-- Left Side: Profile overview & completion -->
        <aside class="col-span-1 reveal">
          <div class="card glass-card text-center" id="profile-sidebar-card" style="padding: var(--space-6);">
            <!-- Populated dynamically by Profile.js -->
            <div class="btn-loader"></div>
            <p class="text-xs text-tertiary mt-2">Loading profile details...</p>
          </div>
        </aside>

        <!-- Center & Right: Editor and Live Preview Tabbed -->
        <section class="col-span-2 reveal">
          <!-- Editor section switches -->
          <div class="card glass-card" style="padding: var(--space-6);">
            
            <div class="tabs-container mb-6">
              <div class="tabs-header flex gap-4" style="border-bottom: 1px solid var(--border-light); padding-bottom: 1px;">
                <button class="tab-btn active" onclick="switchProfileTab('editor', this)" style="border:none; padding:var(--space-2) var(--space-4); cursor:pointer; font-weight:600;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/></svg>
                  Section Editor
                </button>
                <button class="tab-btn" onclick="switchProfileTab('preview', this)" style="border:none; padding:var(--space-2) var(--space-4); cursor:pointer; font-weight:600;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  Live Resume CV
                </button>
              </div>
            </div>

            <!-- Tab 1: Editor Form Panels -->
            <div id="tab-profile-editor" class="flex flex-col gap-6">
              
              <!-- About Me -->
              <div class="profile-section-card" id="section-bio"></div>

              <!-- Skills tags -->
              <div class="profile-section-card" id="section-skills"></div>

              <!-- Experience list -->
              <div class="profile-section-card" id="section-experience"></div>

              <!-- Education list -->
              <div class="profile-section-card" id="section-education"></div>

              <!-- Certifications list -->
              <div class="profile-section-card" id="section-certifications"></div>

              <!-- Links list -->
              <div class="profile-section-card" id="section-portfolio"></div>

            </div>

            <!-- Tab 2: Document Live Preview Panel -->
            <div id="tab-profile-preview" class="hidden">
              <div class="resume-preview-sheet" id="resume-preview">
                <!-- Rendered dynamically -->
              </div>
            </div>

          </div>
        </section>

      </div>

    </div>
  </main>

  <!-- Script Modules -->
  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/profile.js"></script>
  <script src="../js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Components.renderNavbar('profile');
      App.init('profile');
      
      const user = JobForestData.getCurrentUser();
      if (!user) {
        Components.showToast('Please log in as a candidate to construct resumes.', 'warning');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        return;
      }

      if (user.role === 'employer') {
        document.querySelector('main').innerHTML = `
          <div class="container py-16 text-center">
            <div class="card glass-card max-w-md mx-auto p-12">
              <h2>Employers do not have resume builders</h2>
              <p class="text-secondary mt-2">Manage your active posts or company info in the Employer dashboard instead.</p>
              <a href="employer-dashboard.html" class="btn btn-primary btn-sm mt-6">Go to Dashboard</a>
            </div>
          </div>
        `;
        return;
      }

      Profile.init();
      Components.renderFooter('profile');
    });

    function switchProfileTab(tabName, btn) {
      const editor = document.getElementById('tab-profile-editor');
      const preview = document.getElementById('tab-profile-preview');
      
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (tabName === 'editor') {
        editor.classList.remove('hidden');
        preview.classList.add('hidden');
      } else {
        editor.classList.add('hidden');
        preview.classList.remove('hidden');
        
        // Trigger a fresh sync from local storage for live preview
        const user = JobForestData.getCurrentUser();
        if (typeof Profile !== 'undefined') {
          // Profile.js updates the user in-place, but let's re-render
          // The render method is internal, but init or reload handles it.
          // In profile.js we exposed Profile.init which resets bindings
          Profile.init();
        }
      }
    }
  </script>
</body>
</html>
