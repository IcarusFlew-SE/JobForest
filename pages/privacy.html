<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobForest — Privacy Policy</title>

    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/pages.css">

</head>
<body>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Render global navigation header
        Components.renderNavbar('privacy');

        // 2. Build out protected main content container layout
        const contentWrapper = document.createElement('main');
        contentWrapper.id = 'privacy-page-main';
        contentWrapper.style.paddingTop = '85px'; /* Pins text cleanly below fixed nav line */
        contentWrapper.style.minHeight = 'calc(100vh - 85px)';
        contentWrapper.style.width = '100%';
        contentWrapper.style.display = 'block';

        // 3. Inject privacy layout view node into lifecycle
        const privacyContent = Components.renderPrivacyPolicy();
        contentWrapper.appendChild(privacyContent);
        document.body.appendChild(contentWrapper);

        // 4. Append shared site footer component
        Components.renderFooter('privacy');

        // 5. Fire core animations, dark mode hooks, and viewport observers
        App.init('privacy');
    });
    </script>

</body>
</html>
