<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Dashboard — JobForest </title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layouts.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="theme-dark">

  <main class="page-container" style="padding-top: 80px;">
    <div class="container py-8">
      
      <div class="grid grid-cols-4 gap-8">
        
        <!-- Sidebar Navigation -->
        <aside class="col-span-1 reveal">
          <div class="card glass-card" id="dashboard-sidebar" style="padding: var(--space-4); position: sticky; top: 100px;">
            <!-- User summary header -->
            <div class="text-center pb-6 border-b border-light" id="sidebar-user-header">
              <div class="avatar avatar-2xl mx-auto mb-3" id="sidebar-avatar">U</div>
              <h3 style="margin:0; font-size:var(--text-md);" id="sidebar-name">Loading Seeker...</h3>
              <span class="text-xs text-tertiary" style="margin-top:2px; display:inline-block;">Seeker Account</span>
            </div>

            <!-- Tab list links -->
            <nav class="flex flex-col gap-1 mt-6" aria-label="Dashboard navigation">
              <a href="#overview" class="sidebar-nav-item active" data-tab="overview" id="nav-overview">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                Overview
              </a>
              <a href="#applications" class="sidebar-nav-item" data-tab="applications" id="nav-applications">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Applications
              </a>
              <a href="#saved" class="sidebar-nav-item" data-tab="saved" id="nav-saved">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                Saved Jobs
              </a>
              <a href="#messages" class="sidebar-nav-item" data-tab="messages" id="nav-messages">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Messages
              </a>
              <a href="#settings" class="sidebar-nav-item" data-tab="settings" id="nav-settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                Settings
              </a>
            </nav>
          </div>
        </aside>

        <!-- Main Dynamic Content Slot -->
        <section class="col-span-3 reveal" id="dashboard-main-content">
          <div class="btn-loader" style="margin: 50px auto;"></div>
          <!-- Injected dynamically by dashboard.js -->
        </section>

      </div>

    </div>
  </main>

  <!-- Script Modules -->
  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/matching.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Injects navbar
      Components.renderNavbar('candidate-dashboard');
      App.init('candidate-dashboard');

      // Populate user info on sidebar
      const user = JobForestData.getCurrentUser();
      if (user) {
        document.getElementById('sidebar-name').textContent = `${user.firstName} ${user.lastName}`;
        document.getElementById('sidebar-avatar').textContent = user.avatar || user.firstName[0];
      }

      // Start dashboard routing
      Dashboard.init();
      Components.renderFooter('candidate-dashboard');
    });
  </script>
</body>
</html>
