<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobForest — Engineering Blog</title>

    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/pages.css">

</head>
<body>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Render global navigation header
        Components.renderNavbar('blog');

        // 2. Build out protected main content container layout
        const contentWrapper = document.createElement('main');
        contentWrapper.id = 'blog-page-main';
        contentWrapper.style.paddingTop = '85px'; /* Pins content cleanly below fixed nav line */
        contentWrapper.style.minHeight = 'calc(100vh - 85px)';
        contentWrapper.style.width = '100%';
        contentWrapper.style.display = 'block';

        // 3. Mock Empty State View Node for initial deployment
        const blogContainer = document.createElement('section');
        blogContainer.className = 'container reveal';
        blogContainer.style.padding = 'var(--space-16) var(--space-4)';
        blogContainer.style.maxWidth = '600px';
        blogContainer.style.margin = '0 auto';
        blogContainer.style.textAllign = 'center';

        blogContainer.innerHTML = `
          <div style="text-align: center; padding: var(--space-12) 0;">
            <span style="font-size: 3rem; display: block; margin-bottom: var(--space-4);">✍️</span>
            <h1 style="font-size: var(--text-3xl); font-weight: var(--fw-extrabold); margin-bottom: var(--space-2);">JobForest Chronicles</h1>
            <p class="text-secondary" style="font-size: var(--text-sm); line-height: 1.6;">
              Our engineering updates, architectural changes, and technical career deep-dives are currently compiling. Check back shortly for our first publication batch!
            </p>
            <button class="btn btn-primary btn-sm mt-8" onclick="window.location.href='jobs.html'">Browse Active Openings</button>
          </div>
        `;

        contentWrapper.appendChild(blogContainer);
        document.body.appendChild(contentWrapper);

        // 4. Append shared site footer component
        Components.renderFooter('blog');

        // 5. Fire core animations, dark mode hooks, and viewport observers
        App.init('blog');
    });
    </script>

</body>
</html>
