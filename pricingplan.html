<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobForest — Pricing Plans</title>

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/pages.css">

</head>
<body>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Render the navbar using its correct identifier so routing rules resolve
        Components.renderNavbar('pricing');

        // 2. Create a stable, layout-protected container for your page content
        const contentWrapper = document.createElement('main');
        contentWrapper.id = 'pricing-page-main';
        
        // Pushes content down cleanly using your design system variables
        contentWrapper.style.paddingTop = '90px'; 
        contentWrapper.style.minHeight = 'calc(100vh - 90px)';
        contentWrapper.style.width = '100%';
        contentWrapper.style.display = 'block';

        // 3. Mount the pricing layout block inside the wrapper container
        const pricingLayout = Components.renderPricingPlans();
        contentWrapper.appendChild(pricingLayout);
        
        // Safely insert the container into the document tree
        document.body.appendChild(contentWrapper);

        // 4. Render the footer component with its proper path tokens
        Components.renderFooter('pricing');

        // 5. Fire global application initializations safely
        App.init('pricing');
    });
    </script>

</body>
</html>
